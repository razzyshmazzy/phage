---
layout: default
title: PHAGE
---

<!-- The real page underneath the intro shell. Hidden until the shatter
     finishes (or is skipped) and `.revealed` is set on <html>. -->
<div id="page">
  <img class="brand"
       src="{{ '/assets/img/PHAGE.png' | relative_url }}"
       alt="PHAGE" />

  <!-- One rounded card per post, newest first (site.posts order). -->
  <div class="cards">
    {% for post in site.posts %}
      <button class="card" type="button" data-post="{{ post.slug }}">
        <span class="card-title">{{ post.title }}</span>
        <time class="card-date" datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: "%b %-d, %Y" }}
        </time>
        {% if post.excerpt %}
          <span class="card-excerpt">{{ post.excerpt | strip_html | truncate: 140 }}</span>
        {% endif %}
      </button>
    {% endfor %}
  </div>

  <!-- Pre-rendered post bodies, hidden. The overlay clones one of these on
       demand, so there is no client-side markdown parsing. -->
  {% for post in site.posts %}
    <article id="post-{{ post.slug }}" class="post-content" hidden>
      <h1 class="post-title">{{ post.title }}</h1>
      <time class="post-date" datetime="{{ post.date | date_to_xmlschema }}">
        {{ post.date | date: "%b %-d, %Y" }}
      </time>
      {{ post.content }}
    </article>
  {% endfor %}
</div>

<!-- In-place reader overlay (single instance, filled per click). -->
<div id="overlay" hidden>
  <button id="back" type="button" aria-label="Back">&larr;</button>
  <div id="overlay-body" class="prose"></div>
</div>

<!-- PHAGE shell that shatters (removed after the intro plays) -->
<canvas id="shell"></canvas>

<!-- Clears the cached intro flag and reloads so the animation replays -->
<button id="reset" type="button">refresh cache</button>

<script>window.PHAGE_BASE = "{{ site.baseurl }}";</script>
<script src="{{ '/assets/intro.js' | relative_url }}"></script>
<script src="{{ '/assets/blog.js' | relative_url }}"></script>
